# ─── Patabrava · Streamlit native theme ────────────────────────────────────────
# Synced with the dashboard CSS palette. Streamlit applies these to every
# rendered widget BEFORE custom CSS overrides — gives a consistent base so
# we don't fight Streamlit's defaults inside `st.markdown()` injections.

[theme]
base                 = "dark"
primaryColor         = "#ddc269"          # patabrava gold — main accent (calibrated to logo-gold.webp)
backgroundColor      = "#0a0806"          # warm ink — page
secondaryBackgroundColor = "#141008"      # warm ink/10 — sidebar / surfaces
textColor            = "#f5efe0"          # cream — body text
font                 = "sans serif"

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode      = "minimal"

[server]
runOnSave        = true
fileWatcherType  = "auto"
headless         = false
